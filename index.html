<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GC° Frame — Product Render</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #080808;
    --carbon: #111111;
    --border: #2a2a2a;
    --text-primary: #f0f0f0;
    --text-secondary: #888888;
    --signal: #c8ff00;
    --electric: #3D5AFE;
  }

  body {
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas { display: block; }

  /* UI OVERLAY */
  .ui {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 48px;
  }

  .ui-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--text-primary);
    opacity: 0;
    animation: fadeIn 1s ease 0.5s forwards;
  }
  .logo span { color: var(--signal); }

  .ui-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
    text-align: right;
    line-height: 1.8;
  }

  .ui-tag strong {
    display: block;
    color: var(--signal);
    font-weight: 500;
  }

  .ui-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .ui-title {
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  .ui-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 6vw, 88px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--text-primary);
  }

  .ui-title h1 em {
    font-style: normal;
    color: var(--signal);
  }

  .ui-title p {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-top: 16px;
  }

  .ui-specs {
    opacity: 0;
    animation: fadeIn 1s ease 1.5s forwards;
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .spec-item {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text-secondary);
  }

  .spec-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--signal);
    flex-shrink: 0;
  }

  .spec-dot.blue { background: var(--electric); }

  /* Scan line overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 5;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  /* NFC pulse indicator */
  .nfc-indicator {
    position: fixed;
    top: 50%;
    right: 48px;
    transform: translateY(-50%);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .nfc-pulse-ring {
    width: 48px; height: 48px;
    border: 0.5px solid rgba(61,90,254,0.4);
    border-radius: 50%;
    position: relative;
  }

  .nfc-pulse-ring::before, .nfc-pulse-ring::after {
    content: '';
    position: absolute;
    inset: -8px;
    border: 0.5px solid rgba(61,90,254,0.2);
    border-radius: 50%;
    animation: nfc-ripple 2s ease-out infinite;
  }

  .nfc-pulse-ring::after {
    inset: -16px;
    animation-delay: 0.5s;
  }

  .nfc-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--electric);
  }

  .nfc-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--electric);
    text-transform: uppercase;
    writing-mode: vertical-rl;
  }

  @keyframes nfc-ripple {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* Rotation hint */
  .drag-hint {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
    opacity: 0;
    animation: fadeIn 1s ease 2.5s forwards, fadeOut 1s ease 5s forwards;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .drag-hint::before, .drag-hint::after {
    content: '←';
    color: var(--signal);
  }
  .drag-hint::after { content: '→'; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }

  /* Grain overlay */
  .grain {
    position: fixed;
    inset: -50%;
    z-index: 4;
    width: 200%; height: 200%;
    opacity: 0.03;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    animation: grain-move 0.5s steps(2) infinite;
  }

  @keyframes grain-move {
    0% { transform: translate(0,0); }
    25% { transform: translate(-2%,-2%); }
    50% { transform: translate(2%, 2%); }
    75% { transform: translate(-1%, 1%); }
    100% { transform: translate(1%,-1%); }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div class="scanlines"></div>
<div class="grain"></div>

<div class="ui">
  <div class="ui-top">
    <div class="logo">GC<span>°</span></div>
    <div class="ui-tag">
      <strong>Product render</strong>
      Display frame — v1<br>
      Matte black
    </div>
  </div>

  <div class="ui-bottom">
    <div class="ui-title">
      <h1>Display<br>frame<br><em>GC°</em></h1>
      <p>Engineered for the obsessed.</p>
    </div>

    <div class="ui-specs">
      <div class="spec-item"><span>Magnetic lid closure</span><div class="spec-dot"></div></div>
      <div class="spec-item"><span>NFC embedded</span><div class="spec-dot blue"></div></div>
      <div class="spec-item"><span>PSA + WATA compatible</span><div class="spec-dot"></div></div>
      <div class="spec-item"><span>Wall mount + desk stand</span><div class="spec-dot"></div></div>
      <div class="spec-item"><span>Matte black finish</span><div class="spec-dot"></div></div>
    </div>
  </div>
</div>

<div class="nfc-indicator">
  <div class="nfc-label">NFC</div>
  <div class="nfc-pulse-ring">
    <div class="nfc-center">◉</div>
  </div>
</div>

<div class="drag-hint">drag to rotate</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const container = document.getElementById('canvas-container');
  const W = window.innerWidth, H = window.innerHeight;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080808);
  scene.fog = new THREE.Fog(0x080808, 8, 22);

  // Camera
  const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
  camera.position.set(0, 0.5, 6.5);
  camera.lookAt(0, 0, 0);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  container.appendChild(renderer.domElement);

  // ── MATERIALS ──────────────────────────────────────────────
  const matteMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a1a,
    roughness: 0.88,
    metalness: 0.12,
  });

  const acrylicMat = new THREE.MeshPhysicalMaterial({
    color: 0x111820,
    roughness: 0.04,
    metalness: 0.0,
    transmission: 0.7,
    transparent: true,
    opacity: 0.55,
    thickness: 0.08,
    ior: 1.5,
    reflectivity: 0.8,
  });

  const edgeMat = new THREE.MeshStandardMaterial({
    color: 0x2a2a2a,
    roughness: 0.6,
    metalness: 0.4,
  });

  const nfcMat = new THREE.MeshStandardMaterial({
    color: 0x3D5AFE,
    roughness: 0.3,
    metalness: 0.6,
    emissive: 0x1a2680,
    emissiveIntensity: 0.4,
  });

  const signalMat = new THREE.MeshStandardMaterial({
    color: 0xc8ff00,
    roughness: 0.4,
    metalness: 0.1,
    emissive: 0x507000,
    emissiveIntensity: 0.3,
  });

  const keyholeMat = new THREE.MeshStandardMaterial({
    color: 0x080808,
    roughness: 0.9,
    metalness: 0.0,
  });

  // ── FRAME GEOMETRY ─────────────────────────────────────────
  // Dimensions (roughly scaled to real Xbox case proportions)
  // Body: width=1.8, height=2.4, depth=0.5
  const fw = 1.8, fh = 2.4, fd = 0.5;
  const wall = 0.07; // frame wall thickness
  const lidH = 0.18;

  const frameGroup = new THREE.Group();

  // — BODY (outer shell, hollow front/back) —
  // Bottom bar
  const bottomGeo = new THREE.BoxGeometry(fw, wall, fd);
  const bottom = new THREE.Mesh(bottomGeo, matteMat);
  bottom.position.set(0, -(fh/2 - wall/2), 0);
  bottom.castShadow = true;
  frameGroup.add(bottom);

  // Left bar
  const sideGeo = new THREE.BoxGeometry(wall, fh - lidH, fd);
  const leftBar = new THREE.Mesh(sideGeo, matteMat);
  leftBar.position.set(-(fw/2 - wall/2), -lidH/2, 0);
  leftBar.castShadow = true;
  frameGroup.add(leftBar);

  // Right bar
  const rightBar = new THREE.Mesh(sideGeo, matteMat);
  rightBar.position.set(fw/2 - wall/2, -lidH/2, 0);
  rightBar.castShadow = true;
  frameGroup.add(rightBar);

  // Back plate (slightly recessed)
  const backGeo = new THREE.BoxGeometry(fw - wall*2, fh - lidH - wall, 0.025);
  const backPlate = new THREE.Mesh(backGeo, matteMat);
  backPlate.position.set(0, -lidH/2, -(fd/2 - 0.013));
  backPlate.castShadow = true;
  frameGroup.add(backPlate);

  // Front acrylic window
  const frontGeo = new THREE.BoxGeometry(fw - wall*2 - 0.04, fh - lidH - wall - 0.04, 0.018);
  const frontAcrylic = new THREE.Mesh(frontGeo, acrylicMat);
  frontAcrylic.position.set(0, -lidH/2, fd/2 - 0.01);
  frameGroup.add(frontAcrylic);

  // Back acrylic window (slightly smaller, more recessed)
  const backAcrylicGeo = new THREE.BoxGeometry(fw - wall*2 - 0.08, fh - lidH - wall - 0.08, 0.018);
  const backAcrylic = new THREE.Mesh(backAcrylicGeo, acrylicMat);
  backAcrylic.position.set(0, -lidH/2, -(fd/2 - 0.035));
  frameGroup.add(backAcrylic);

  // Front rim (thin raised border around acrylic)
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.3 });

  // — DESK STAND (bottom tab) —
  const standGeo = new THREE.BoxGeometry(fw * 0.6, wall * 1.2, fd * 1.3);
  const stand = new THREE.Mesh(standGeo, matteMat);
  stand.position.set(0, -(fh/2 + wall*0.6), 0.06);
  stand.castShadow = true;
  frameGroup.add(stand);

  // Stand lip
  const lipGeo = new THREE.BoxGeometry(fw * 0.6, wall * 0.6, 0.06);
  const lip = new THREE.Mesh(lipGeo, edgeMat);
  lip.position.set(0, -(fh/2 + wall*0.9), fd * 0.65 * 0.5 + 0.03);
  frameGroup.add(lip);

  // — KEYHOLE MOUNT (back plate) —
  for (let kx of [-0.4, 0.4]) {
    const khGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.03, 16);
    const kh = new THREE.Mesh(khGeo, keyholeMat);
    kh.rotation.x = Math.PI / 2;
    kh.position.set(kx, 0.4, -(fd/2 - 0.038));
    frameGroup.add(kh);

    // Small screw head look
    const screwGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.01, 8);
    const screw = new THREE.Mesh(screwGeo, edgeMat);
    screw.rotation.x = Math.PI / 2;
    screw.position.set(kx, 0.4, -(fd/2 - 0.025));
    frameGroup.add(screw);
  }

  // — MAGNETIC LID ——————————————————————————————
  const lidGroup = new THREE.Group();

  // Lid main body
  const lidGeo = new THREE.BoxGeometry(fw, lidH, fd);
  const lid = new THREE.Mesh(lidGeo, matteMat);
  lid.castShadow = true;
  lidGroup.add(lid);

  // Lid front edge chamfer strip
  const chamferGeo = new THREE.BoxGeometry(fw, lidH * 0.15, 0.015);
  const chamfer = new THREE.Mesh(chamferGeo, edgeMat);
  chamfer.position.set(0, 0, fd/2 + 0.007);
  lidGroup.add(chamfer);

  // NFC chip (embedded on underside of lid, slightly visible)
  const nfcGeo = new THREE.BoxGeometry(0.22, 0.016, 0.14);
  const nfcChip = new THREE.Mesh(nfcGeo, nfcMat);
  nfcChip.position.set(0.3, -lidH/2 + 0.008, 0);
  lidGroup.add(nfcChip);

  // NFC antenna trace (thin ring)
  const nfcRingGeo = new THREE.TorusGeometry(0.18, 0.006, 8, 32);
  const nfcRing = new THREE.Mesh(nfcRingGeo, nfcMat);
  nfcRing.rotation.x = Math.PI / 2;
  nfcRing.position.set(0.3, -lidH/2 + 0.01, 0);
  lidGroup.add(nfcRing);

  // Magnet dots (visible as small circles on lid underside)
  const magnetPositions = [-0.6, -0.2, 0.2, 0.6];
  magnetPositions.forEach(mx => {
    const magGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.012, 16);
    const mag = new THREE.Mesh(magGeo, signalMat);
    mag.rotation.x = Math.PI / 2;
    mag.position.set(mx, -lidH/2 + 0.006, 0);
    lidGroup.add(mag);
  });

  // Position lid at top of frame
  lidGroup.position.set(0, fh/2 - lidH/2, 0);
  frameGroup.add(lidGroup);

  // ── FLOATING PARTICLES (subtle dust) ───────────────────────
  const particleCount = 60;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 6;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 6;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0x333333,
    size: 0.012,
    transparent: true,
    opacity: 0.6,
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ── GROUND REFLECTION PLANE ────────────────────────────────
  const groundGeo = new THREE.PlaneGeometry(20, 20);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a0a,
    roughness: 0.2,
    metalness: 0.8,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -(fh/2 + wall * 1.5);
  ground.receiveShadow = true;
  scene.add(ground);

  // ── SCENE GROUP ────────────────────────────────────────────
  const pivot = new THREE.Group();
  pivot.add(frameGroup);
  scene.add(pivot);

  // ── LIGHTING ───────────────────────────────────────────────
  // Ambient — very dark
  const ambient = new THREE.AmbientLight(0xffffff, 0.08);
  scene.add(ambient);

  // Key light — cool white from upper left
  const keyLight = new THREE.SpotLight(0xd0e8ff, 3.5, 20, Math.PI * 0.18, 0.4, 1.5);
  keyLight.position.set(-3.5, 5, 4);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.width = 2048;
  keyLight.shadow.mapSize.height = 2048;
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 20;
  scene.add(keyLight);

  // Fill light — very dim warm from right
  const fillLight = new THREE.PointLight(0xffe8c0, 0.4, 12);
  fillLight.position.set(4, 0, 3);
  scene.add(fillLight);

  // Rim light — signal green from behind/below
  const rimLight = new THREE.PointLight(0xc8ff00, 0.6, 8);
  rimLight.position.set(0.5, -2, -3.5);
  scene.add(rimLight);

  // NFC accent — electric blue glow near lid
  const nfcLight = new THREE.PointLight(0x3D5AFE, 0.8, 3);
  nfcLight.position.set(0.3, fh/2, 0.5);
  scene.add(nfcLight);

  // Top strip light (simulates studio softbox)
  const topLight = new THREE.RectAreaLight(0xffffff, 1.5, 3, 0.5);
  topLight.position.set(0, 5, 2);
  topLight.lookAt(0, 0, 0);
  scene.add(topLight);

  // ── MOUSE DRAG ROTATION ────────────────────────────────────
  let isDragging = false;
  let prevMouse = { x: 0, y: 0 };
  let targetRotY = 0.3, targetRotX = 0.05;
  let currentRotY = 0.3, currentRotX = 0.05;
  let autoRotate = true;
  let autoRotateTimer = null;

  renderer.domElement.addEventListener('mousedown', e => {
    isDragging = true;
    autoRotate = false;
    prevMouse = { x: e.clientX, y: e.clientY };
    clearTimeout(autoRotateTimer);
  });

  renderer.domElement.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    targetRotY += dx * 0.008;
    targetRotX += dy * 0.004;
    targetRotX = Math.max(-0.4, Math.min(0.4, targetRotX));
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  renderer.domElement.addEventListener('mouseup', () => {
    isDragging = false;
    autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
  });

  // Touch support
  renderer.domElement.addEventListener('touchstart', e => {
    isDragging = true;
    autoRotate = false;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });

  renderer.domElement.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    targetRotY += dx * 0.008;
    targetRotX += dy * 0.004;
    targetRotX = Math.max(-0.4, Math.min(0.4, targetRotX));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });

  renderer.domElement.addEventListener('touchend', () => {
    isDragging = false;
    autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
  });

  // ── LID ANIMATION ──────────────────────────────────────────
  // Lid gently lifts open and closes every ~8 seconds
  let lidPhase = 0; // 0 = closed, will animate open then closed
  let lidOpenT = 0;
  const lidOpenDelay = 3.5; // seconds before first open
  const lidOpenDuration = 1.2;
  const lidCloseDuration = 0.9;
  const lidHoldDuration = 1.8;
  let lidState = 'waiting'; // waiting | opening | open | closing
  let lidTimer = 0;
  const lidMaxAngle = -Math.PI * 0.55; // how far lid swings back

  // NFC light pulse
  let nfcPulse = 0;

  // ── ANIMATION LOOP ─────────────────────────────────────────
  const clock = new THREE.Clock();
  let elapsed = 0;

  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    elapsed += delta;

    // Auto rotate
    if (autoRotate) {
      targetRotY += delta * 0.28;
    }

    // Smooth damping
    currentRotY += (targetRotY - currentRotY) * 0.06;
    currentRotX += (targetRotX - currentRotX) * 0.06;
    pivot.rotation.y = currentRotY;
    pivot.rotation.x = currentRotX;

    // Lid animation sequence
    lidTimer += delta;
    if (lidState === 'waiting' && lidTimer > lidOpenDelay) {
      lidState = 'opening';
      lidTimer = 0;
    } else if (lidState === 'opening') {
      const t = Math.min(lidTimer / lidOpenDuration, 1);
      lidGroup.rotation.x = easeInOut(t) * lidMaxAngle;
      if (t >= 1) { lidState = 'open'; lidTimer = 0; }
    } else if (lidState === 'open') {
      // Gentle float while open
      lidGroup.rotation.x = lidMaxAngle + Math.sin(elapsed * 1.5) * 0.02;
      if (lidTimer > lidHoldDuration) { lidState = 'closing'; lidTimer = 0; }
    } else if (lidState === 'closing') {
      const t = Math.min(lidTimer / lidCloseDuration, 1);
      lidGroup.rotation.x = lidMaxAngle * (1 - easeOut(t));
      if (t >= 1) {
        lidGroup.rotation.x = 0;
        lidState = 'waiting';
        lidTimer = 0;
      }
    }

    // NFC light pulse — active when lid is open
    if (lidState === 'open' || lidState === 'opening') {
      nfcPulse = Math.min(nfcPulse + delta * 2, 1);
    } else {
      nfcPulse = Math.max(nfcPulse - delta * 1.5, 0);
    }
    nfcLight.intensity = 0.3 + nfcPulse * (0.8 + Math.sin(elapsed * 4) * 0.3);

    // Rim light breathe
    rimLight.intensity = 0.4 + Math.sin(elapsed * 0.7) * 0.2;

    // Particle drift
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      pos[i * 3 + 1] += delta * 0.015;
      if (pos[i * 3 + 1] > 3) pos[i * 3 + 1] = -3;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Subtle frame bob
    frameGroup.position.y = Math.sin(elapsed * 0.5) * 0.03;

    renderer.render(scene, camera);
  }

  animate();

  // Resize
  window.addEventListener('resize', () => {
    const W = window.innerWidth, H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

})();
</script>
</body>
</html>
